<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Event Registration</h1>
    <p class="description">
      Fill in the form below to register for our technology event.
      All fields are required and you must be at least 18 years old.
    </p>

    <section class="card">
      <form id="registrationForm">
        <div class="form-group">
          <label class="input-label" for="fullName">Full name</label>
          <input class="form-input" type="text" id="fullName" placeholder="e.g. John Doe">
        </div>

        <div class="form-group">
          <label class="input-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="e.g. john@example.com">
        </div>

        <div class="form-group">
          <label class="input-label" for="age">Age</label>
          <input class="form-input" type="number" id="age" placeholder="e.g. 25">
        </div>

        <div class="form-group">
          <label class="input-label" for="technology">Favorite technology</label>
          <select class="form-input" id="technology">
            <option value="">-- choose a technology --</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
            <option value="React">React</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms">
          <label for="terms">I accept the event terms and conditions</label>
        </div>

        <button class="btn" type="submit">Register</button>
      </form>

      <div id="message" class="message"></div>
    </section>

    <section class="card" id="participantsSection">
      <h2>Registered participants (<span id="participantCount">0</span>)</h2>

      <div id="statistics" class="statistics"></div>

      <div class="tools">
        <input class="form-input" type="text" id="searchInput" placeholder="Search by name or email...">
        <select class="form-input" id="filterTechnology">
          <option value="All">All technologies</option>
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="JavaScript">JavaScript</option>
          <option value="React">React</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <ul id="participantList" class="participant-list"></ul>
      <p id="emptyInfo" class="empty-info">No participants yet. Be the first to register!</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
